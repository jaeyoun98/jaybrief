<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>JayBrief</title>
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f7f9">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111418">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="app-header">
    <h1 id="app-title">JayBrief</h1>
    <div class="header-right">
      <span id="freshness" class="freshness"></span>
      <button id="refresh-btn" class="icon-btn" aria-label="새로고침">&#8635;</button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-view="feed" role="tab" aria-selected="true">피드</button>
    <button class="tab" data-view="digest" role="tab" aria-selected="false">브리핑</button>
    <button class="tab" data-view="events" role="tab" aria-selected="false">주요 이벤트</button>
  </nav>

  <main>
    <section id="view-feed" class="view">
      <div class="chips-bar">
        <div class="chips" id="theme-chips">
          <button class="chip active" data-theme="all">전체</button>
          <button class="chip" data-theme="semi">반도체</button>
          <button class="chip" data-theme="sw">SW테크</button>
        </div>
        <div class="chips" id="rank-chips">
          <button class="chip" data-rank="top">주요</button>
          <button class="chip" data-rank="all">전체</button>
        </div>
      </div>
      <ul id="feed-list" class="feed-list"></ul>
      <p id="feed-empty" class="empty hidden">표시할 기사가 없습니다.</p>
    </section>

    <section id="view-digest" class="view hidden">
      <div class="digest-toolbar">
        <label for="digest-archive">브리핑 기록</label>
        <select id="digest-archive"></select>
      </div>
      <div id="digest-meta" class="digest-meta"></div>
      <div id="digest-body"></div>
      <p id="digest-empty" class="empty hidden">
        아직 생성된 브리핑이 없습니다.<br>
        GitHub repo에 <code>GEMINI_API_KEY</code> secret을 등록하면 매일 07:30 / 12:30 / 18:30 / 21:00에 생성됩니다.
      </p>
    </section>

    <section id="view-events" class="view hidden">
      <div class="calendar-toolbar">
        <button id="month-prev" class="calendar-nav" aria-label="이전 달">&lsaquo;</button>
        <h2 id="calendar-month"></h2>
        <button id="month-next" class="calendar-nav" aria-label="다음 달">&rsaquo;</button>
      </div>
      <div class="chips" id="event-chips">
        <button class="chip active" data-event-filter="all">전체</button>
        <button class="chip" data-event-filter="semi">반도체</button>
        <button class="chip" data-event-filter="sw">SW테크</button>
        <button class="chip" data-event-filter="macro">Macro</button>
      </div>
      <div class="calendar-weekdays" aria-hidden="true">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
      <div class="agenda-header">
        <h2 id="agenda-title">이번 달 일정</h2>
        <button id="agenda-reset" class="text-btn hidden">전체 보기</button>
      </div>
      <div id="event-agenda" class="event-agenda"></div>
      <p id="events-empty" class="empty hidden">해당 기간에 등록된 이벤트가 없습니다.</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>

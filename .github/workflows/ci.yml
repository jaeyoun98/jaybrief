name: ci

on:
  push:
    paths:
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"
      - "sources.json"
      - "companies.json"
      - "events.json"
      - "index.html"
      - "app.js"
      - "style.css"
      - "sw.js"
      - ".github/workflows/ci.yml"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"
      - "sources.json"
      - "companies.json"
      - "events.json"
      - "index.html"
      - "app.js"
      - "style.css"
      - "sw.js"
      - ".github/workflows/ci.yml"
      - ".github/workflows/pages.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: node --check app.js && node --check sw.js

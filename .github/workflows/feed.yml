name: feed

on:
  schedule:
    - cron: "17 * * * *" # hourly; offset avoids top-of-hour runner congestion
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-commit # shared with digest.yml so pushes never race
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_feeds.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "Update feed data"
            git pull --rebase origin main
            git push
          fi
